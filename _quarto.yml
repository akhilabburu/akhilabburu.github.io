project:
  type: website
  output-dir: docs
  
execute: 
  cache: true
  freeze: auto

website:
  title: "Akhil Abburu"
  search: true
  open-graph: true
  navbar:
    background: dark
    left:
     # - text: Home
     #   file: index.qmd
     - text: Research Output
       href: output.qmd
     - text: Projects
       href: posts.qmd
    right:
     - icon: linkedin
       href: https://www.linkedin.com/in/akhil-abburu/
  site-url: https://akhilabburu.github.io/
  description: "Personal Website"

format:
  html:
    minimal: true
    smooth-scroll: true
    embed-resources: false
    css: styles.css
    theme:
      dark:  [darkly, darkly.scss]
      light: [flatly, flatly.scss]
    linestretch: 1.7
    link-external-newwindow: true
    link-external-filter: '^(?:http:|https:)\/\/akhilabburu\.github\.io'
    include-in-header:
      - text: |
          <!-- Analytics -->
          <script data-goatcounter="https://1346920.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
          
          <!-- Preload critical resources -->
          <link rel="preload" href="styles.css" as="style">
          
          <!-- Font optimization -->
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          
          <!-- Critical CSS for text rendering -->
          <style>
          p {
            font-display: swap;
            /* Add other critical text rendering styles as needed */
          }
          </style>